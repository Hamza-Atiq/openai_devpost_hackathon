[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = ["uv run --directory apps/api python -m app.deployment.runtime migrate"]
startCommand = "uv run --directory apps/api python -m app.deployment.runtime serve"
healthcheckPath = "/health/live"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
